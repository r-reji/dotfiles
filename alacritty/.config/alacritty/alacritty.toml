# "cursor.style" = "Block"
general.import = ["~/.config/alacritty/themes/themes/catppuccin_macchiato.toml"]
general.live_config_reload = true

[bell]
animation = "EaseOutExpo"
duration = 0

[colors]
draw_bold_text_with_bright_colors = true

[env]
TERM = "xterm-256color"

[font]
size = 11

[font.bold]
# family = "CaskaydiaCove Nerd Font"
# family = "JetBrainsMono Nerd Font"
# family = "FiraCode Nerd Font"
family = "JetBrainsMono NFM"
style = "Bold"

[font.italic]
# family = "CaskaydiaCove Nerd Font"
# family = "JetBrainsMono Nerd Font"
# family = "FiraCode Nerd Font"
family = "JetBrainsMono NFM"
style = "Italic"

[font.normal]
# family = "CaskaydiaCove Nerd Font"
# family = "JetBrainsMono Nerd Font"
# family = "FiraCode Nerd Font"
family = "JetBrainsMono NFM"
style = "Regular"

[[mouse.bindings]]
action = "PasteSelection"
mouse = "Middle"

[scrolling]
history = 10000
multiplier = 6

[window]
decorations = "None"
startup_mode = "Maximized"

[keyboard]
bindings = [
  # Map Alt+<> to send Ctrl+W (hex \u0017)
  { key = "Back", mods = "Alt", chars = "\u0017" },
  { key = "Back", mods = "Control", chars = "\u0017" }
]