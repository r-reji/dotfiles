format = """
\\($username$hostname\\) $aws $directory\ 
$fill\
$git_branch$git_state$git_status$docker_context$python$golang$cpp$java$cmd_duration$jobs   
$character
"""

palette = "catppuccin_macchiato"

[username]
style_user = "green italic bold"
style_root = "red bold"
format = "[$user]($style)"
disabled = false
show_always = true

[hostname]
ssh_only = false
format = " on [$hostname](italic bold purple)"
trim_at = "."
disabled = false

[character]
success_symbol = "[â‍œ](bold green)"
error_symbol = "[âœ—](bold red)"

[directory]
truncation_length = 5
truncation_symbol = '.../'
truncate_to_repo = true
style = "bold italic blue"

[fill]
symbol = ' '

[cmd_duration]
min_time = 2000
style = "bold italic red"

[jobs]
number_threshold=1

[docker_context]
symbol = 'ًںگ³'
format = "[$symbol$context]($style) "
style = "blue bold"
only_with_files = true
detect_files = ["docker-compose.yml", "docker-compose.yaml", "Dockerfile"]
detect_folders = []
disabled = false

[aws]
format = '[$symbol($profile) ]($style)'

[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'
stashed = "[${count}*](flamingo)" 
modified = "[${count}+](yellow)" 
deleted =  "[${count}-](red)" 
conflicted =  "[${count}~](red)" 
ahead = "â‡،${count}"
behind = "â‡£${count}"
untracked = "[${count}?](blue)" 
staged = "[${count}+](green)" 

[git_state]
style =	"bold red"
format = "[$state( $progress_current/$progress_total) ]($style)"
rebase = "rebase"
merge = "merge"	
revert = "revert"
cherry_pick = "cherry"
bisect = "bisect"	
am = "am"	
am_or_rebase = "am/rebase"

[python]
symbol = 'îœ¼ '
pyenv_version_name = true
format = '[ ${symbol}Python(\($virtualenv\) )]($style)'
style = "bold yellow"
pyenv_prefix = "venv "
python_binary = ["./venv/bin/python", "python", "python3", "python2"]
detect_extensions = ["py"]

[golang]
symbol = 'îک§ '
format = '[ ${symbol}Golang ]($style)'

[java]
symbol = 'î‰– '
format = '[ ${symbol}Java ($version)]($style)'

[cpp]
symbol = 'îک‌ '
format = '[ ${symbol}C++ ($version)]($style)'

